<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Contatos Beirensse</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">

    <style>
        /* =========================================
           DESIGN PREMIUM (GLASSMORPHISM)
           ========================================= */
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            /* Fundo com gradiente suave (Azul, Verde e Roxo claro) */
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #333;
            display: flex;
            justify-content: center;
        }

        /* O "Vidro" principal da App */
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .header-app {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 5px 0;
            color: #1a1a1a;
        }

        .subtitle {
            font-size: 13px;
            color: #444;
            margin-bottom: 5px;
        }

        .data-criacao {
            font-size: 11px;
            color: #666;
            margin-bottom: 20px;
            display: block;
        }

        /* Caixas de Texto (Inputs) */
        textarea, input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        textarea:focus, input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #9b59b6;
            box-shadow: 0 0 8px rgba(155, 89, 182, 0.3);
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        label {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 5px;
            display: block;
            color: #2c3e50;
        }

        /* Botões Mágicos */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-filtrar {
            /* Roxo brilhante */
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            box-shadow: 0 4px 15px rgba(142, 68, 173, 0.3);
        }

        .btn-baixar {
            /* Verde-azulado */
            background: linear-gradient(135deg, #1abc9c, #16a085);
            box-shadow: 0 4px 15px rgba(26, 188, 156, 0.3);
        }

        /* Caixas de Resultados */
        .resultados-grid {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .box-resultado {
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        .box-resultado h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #2c3e50;
        }

        .contador {
            font-size: 24px;
            font-weight: 700;
            color: #27ae60;
        }

    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="header-app">
            <h1>🏷️ Extrator de Contatos</h1>
            <div class="subtitle">Desenvolvido com ❤️ por <strong>Beirensse</strong></div>
            <span class="data-criacao">📅 Criado em: 28 de Fevereiro de 2026</span>
        </div>

        <label for="texto_geral">📋 1. Cole TUDO misturado aqui...</label>
        <textarea id="texto_geral" placeholder="Cole as mensagens do WhatsApp aqui..."></textarea>

        <label for="codigo_dae">🔍 Seu Código (Filtro) - Opcional:</label>
        <input type="text" id="codigo_dae" value="" placeholder="Ex: Por-2 (Deixe em branco para extrair tudo)">

        <button class="btn-filtrar" onclick="filtrarContatos()">🪄 2. Filtrar e Separar</button>

        <div class="resultados-grid">
            <div class="box-resultado">
                <h3>👨 Homens</h3>
                <div class="contador" id="count_masc">0</div>
            </div>
            <div class="box-resultado">
                <h3>👩 Mulheres</h3>
                <div class="contador" id="count_fem">0</div>
            </div>
        </div>

        <br>
        <button class="btn-baixar" onclick="baixarVCF()">📇 3. Baixar Agenda</button>
    </div>

    <script>
        /* =========================================
           O "CÉREBRO" DO EXTRATOR BEIRENSSE
           ========================================= */
        let listaHomens = [];
        let listaMulheres = [];

        function filtrarContatos() {
            const textoOriginal = document.getElementById('texto_geral').value;
            const filtroTexto = document.getElementById('codigo_dae').value.trim();
            
            // Limpar listas anteriores
            listaHomens = [];
            listaMulheres = [];

            // Divide o texto grande em blocos a cada linha vazia ou quebra de linha dupla
            const blocos = textoOriginal.split(/\n\s*\n/);

            blocos.forEach(bloco => {
                // SE O FILTRO ESTIVER PREENCHIDO E NÃO ESTIVER NESTE BLOCO, IGNORA E PULA PARA O PRÓXIMO
                if (filtroTexto !== "" && !bloco.toLowerCase().includes(filtroTexto.toLowerCase())) {
                    return; 
                }

                // Procura um número de telefone com o sinal + (ex: +244975835646)
                const telefoneMatch = bloco.match(/\+\d{10,15}/);
                if (!telefoneMatch) return; // Se não tem telefone, não é contacto
                
                const telefone = telefoneMatch[0];
                let nome = "Contato Extraído";

                // Tenta puxar o nome (procura a palavra Nome: ou الإسم:)
                const nomeMatch = bloco.match(/(?:Nome|الإسم|Name)\s*:\s*([^\n,]+)/i);
                if (nomeMatch) {
                    nome = nomeMatch[1].trim();
                }

                // Verifica o género lendo os emojis ou palavras
                const isFeminino = /feminino|mulher|♀️/i.test(bloco);
                
                // Separação Final
                if (isFeminino) {
                    listaMulheres.push({ nome: nome, telefone: telefone });
                } else {
                    listaHomens.push({ nome: nome, telefone: telefone });
                }
            });

            // Atualiza os números no ecrã
            document.getElementById('count_masc').innerText = listaHomens.length;
            document.getElementById('count_fem').innerText = listaMulheres.length;

            if(listaHomens.length === 0 && listaMulheres.length === 0) {
                alert("Nenhum contacto encontrado. Verifique se o seu filtro está correto ou deixe-o em branco.");
            }
        }

        function baixarVCF() {
            if (listaHomens.length === 0 && listaMulheres.length === 0) {
                alert("⚠️ Primeiro cole o texto e clique em 'Filtrar e Separar'!");
                return;
            }

            let vcfContent = "";

            // Monta o ficheiro VCF (Agenda) para Homens
            listaHomens.forEach(c => {
                vcfContent += "BEGIN:VCARD\nVERSION:3.0\nFN:" + c.nome + " (H)\nTEL;TYPE=CELL:" + c.telefone + "\nEND:VCARD\n";
            });

            // Monta o ficheiro VCF (Agenda) para Mulheres
            listaMulheres.forEach(c => {
                vcfContent += "BEGIN:VCARD\nVERSION:3.0\nFN:" + c.nome + " (M)\nTEL;TYPE=CELL:" + c.telefone + "\nEND:VCARD\n";
            });

            // Cria e faz o download mágico
            const blob = new Blob([vcfContent], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Contatos_Organizados_Beirensse.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        /* =========================================
           SISTEMA DE SEGURANÇA MÁXIMA (OFFLINE / PWA)
           ========================================= */
        if ('serviceWorker' in navigator) {
            // Verifica se você acedeu usando o link secreto com "?admin=beirensse"
            if (window.location.href.includes('?admin=beirensse')) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Modo Offline Ativado para Administrador'))
                    .catch(err => console.log('Erro ao instalar PWA:', err));
                });
            } else {
                // Se o link for o normal (sem a chave), ele destrói qualquer instalação offline anterior
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister();
                        console.log('⛔ Acesso Offline Bloqueado/Removido do Utilizador.');
                    }
                });
            }
        }
    </script>
</body>
</html>
